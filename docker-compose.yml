version: "3.8"
services:
  redis:
    image: redis:7-alpine
    container_name: vidlytics-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    env_file:
      - .env
    command: >
      sh -c "redis-server --appendonly yes --requirepass $$REDIS_PASSWORD --maxmemory 256mb --maxmemory-policy noeviction"
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data: